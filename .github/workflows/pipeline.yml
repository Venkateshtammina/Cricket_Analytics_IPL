name: Enterprise Data Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      - name: Initialize Production Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip Dependency Wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Active Application Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline Integrity Check Suite
        run: |
          python -m pytest tests/
